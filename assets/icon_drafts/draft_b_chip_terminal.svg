<?xml version="1.0" encoding="UTF-8"?>
<!-- Draft B: 芯片轮廓 + 终端光标 — 嵌入式调试 + 实时输出 -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2738"/>
      <stop offset="100%" stop-color="#0e1828"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bgB)"/>
  <!-- 芯片主体：圆角方形 -->
  <rect x="56" y="56" width="144" height="144" rx="16" ry="16"
        fill="none" stroke="#28afe9" stroke-width="6"/>
  <!-- 4 边引脚（每边 4 条） -->
  <g fill="#28afe9">
    <!-- 上 -->
    <rect x="78" y="36" width="10" height="22" rx="2"/>
    <rect x="104" y="36" width="10" height="22" rx="2"/>
    <rect x="130" y="36" width="10" height="22" rx="2"/>
    <rect x="156" y="36" width="10" height="22" rx="2"/>
    <!-- 下 -->
    <rect x="78" y="198" width="10" height="22" rx="2"/>
    <rect x="104" y="198" width="10" height="22" rx="2"/>
    <rect x="130" y="198" width="10" height="22" rx="2"/>
    <rect x="156" y="198" width="10" height="22" rx="2"/>
    <!-- 左 -->
    <rect x="36" y="78" width="22" height="10" rx="2"/>
    <rect x="36" y="104" width="22" height="10" rx="2"/>
    <rect x="36" y="130" width="22" height="10" rx="2"/>
    <rect x="36" y="156" width="22" height="10" rx="2"/>
    <!-- 右 -->
    <rect x="198" y="78" width="22" height="10" rx="2"/>
    <rect x="198" y="104" width="22" height="10" rx="2"/>
    <rect x="198" y="130" width="22" height="10" rx="2"/>
    <rect x="198" y="156" width="22" height="10" rx="2"/>
  </g>
  <!-- 终端 prompt 符号 ">_" 居中 -->
  <text x="128" y="158" font-family="Consolas, 'Courier New', monospace"
        font-size="96" font-weight="bold" fill="#55ff55"
        text-anchor="middle">&gt;_</text>
</svg>
